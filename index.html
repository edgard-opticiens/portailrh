<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail RH — Groupe Edgard Opticiens / Générale Optique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ====== THÈMES PAR MARQUE — modifie librement les hex ici ====== */
  body[data-theme="edgard"]{
    --page-bg:#F5F1EA;  --ink:#1C1813;  --muted:#6E6458;  --line:#E5DDCF;
    --surface:#FFFFFF;  --accent:#A67C36;  --accent-2:#C9A465;
    --accent-soft:rgba(166,124,54,.12);
    --panel-bg:#181210;  --panel-2:#241B16;  --panel-fg:#F3ECDF;
  }
  body[data-theme="gdo"]{
    --page-bg:#EDF5F0;  --ink:#11231A;  --muted:#566B60;  --line:#D3E5DB;
    --surface:#FFFFFF;  --accent:#0A8A4F;  --accent-2:#F39222;
    --accent-soft:rgba(10,138,79,.12);
    --panel-bg:#0A6E41;  --panel-2:#0A8A4F;  --panel-fg:#EBF6EF;
  }
  /* =============================================================== */

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Inter",system-ui,sans-serif;
    color:var(--ink);
    background:var(--page-bg);
    min-height:100vh;-webkit-font-smoothing:antialiased;
    transition:background-color .5s ease,color .5s ease;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:46px 24px 64px}

  /* ---- Masthead (identité groupe, stable) ---- */
  .dots{display:flex;gap:7px;margin-bottom:22px}
  .dots i{width:9px;height:9px;border-radius:50%;display:block;background:var(--accent);transition:background-color .5s ease}
  .dots i:nth-child(2){opacity:.55}
  .dots i:nth-child(3){background:transparent;border:1.6px solid var(--accent);transition:border-color .5s ease}
  .eyebrow{font-family:"Inter";font-size:.74rem;font-weight:600;letter-spacing:.32em;
    text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  h1{font-family:"Fraunces";font-weight:600;font-size:clamp(1.9rem,4.6vw,3.1rem);
    line-height:1.05;letter-spacing:-.015em;margin:0 0 14px;font-variation-settings:"opsz" 120}
  .role{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:1.02rem;margin:0}
  .role::before{content:"";width:34px;height:1.5px;background:var(--accent);transition:background-color .5s ease}

  /* ---- Sélecteur de marque ---- */
  .switch{display:flex;flex-wrap:wrap;gap:10px;margin:34px 0 0}
  .brand-btn{flex:1;min-width:200px;display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1.5px solid var(--line);border-radius:14px;
    padding:14px 18px;cursor:pointer;text-align:left;font-family:"Inter";
    transition:border-color .25s ease,box-shadow .25s ease,transform .15s ease}
  .brand-btn:hover{transform:translateY(-1px)}
  .brand-btn .tick{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);
    flex:none;display:grid;place-items:center;transition:all .2s ease}
  .brand-btn .lbl{font-weight:600;font-size:.98rem;color:var(--ink)}
  .brand-btn .sub{display:block;font-weight:400;font-size:.8rem;color:var(--muted);margin-top:1px}
  .brand-btn[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .brand-btn[aria-pressed="true"] .tick{border-color:var(--accent);background:var(--accent)}
  .brand-btn[aria-pressed="true"] .tick::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff}
  .brand-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---- Panneau marque (hero themé) ---- */
  .panel{position:relative;margin-top:18px;border-radius:22px;overflow:hidden;
    background:linear-gradient(135deg,var(--panel-bg),var(--panel-2));
    color:var(--panel-fg);padding:38px 36px;
    transition:background-color .5s ease;
    box-shadow:0 24px 60px -34px rgba(0,0,0,.6)}
  .panel::after{content:"";position:absolute;right:-60px;top:-60px;width:260px;height:260px;
    border-radius:50%;border:1.5px solid var(--panel-fg);opacity:.12}
  .panel::before{content:"";position:absolute;right:10px;top:10px;width:120px;height:120px;
    border-radius:50%;border:1.5px solid var(--panel-fg);opacity:.12}
  .panel .kicker{font-size:.74rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
    opacity:.75;margin:0 0 14px}
  .logo-slot{display:flex;align-items:center;min-height:54px}
  .logo-slot img{max-height:54px;max-width:260px;display:block}
  .wordmark{font-family:"Fraunces";font-size:2rem;font-weight:600;line-height:1;
    font-variation-settings:"opsz" 120}
  .wordmark small{display:block;font-family:"Inter";font-size:.8rem;font-weight:500;
    letter-spacing:.16em;text-transform:uppercase;opacity:.8;margin-top:6px}
  .panel p.intro{margin:18px 0 0;max-width:48ch;line-height:1.55;opacity:.9;font-size:1rem}

  /* ---- Cartes ---- */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:18px}
  .card{position:relative;display:flex;flex-direction:column;gap:13px;
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:24px;text-decoration:none;color:inherit;overflow:hidden;
    transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease,background-color .5s ease}
  .card::after{content:"";position:absolute;inset:10px;border-radius:12px;
    border:1.5px solid var(--accent);opacity:0;transform:scale(.985);
    transition:opacity .25s ease,transform .25s ease,border-color .5s ease;pointer-events:none}
  .card:hover{transform:translateY(-3px);box-shadow:0 18px 40px -24px rgba(0,0,0,.4);border-color:transparent}
  .card:hover::after{opacity:.22;transform:scale(1)}
  .card:focus-visible{outline:none}
  .card:focus-visible::after{opacity:.5;transform:scale(1)}
  .ico{width:48px;height:48px;border-radius:13px;background:var(--accent-soft);
    display:grid;place-items:center;color:var(--accent);flex:none;transition:background-color .5s ease,color .5s ease}
  .ico svg{width:24px;height:24px;stroke:currentColor;stroke-width:1.8;fill:none}
  .card h2{font-family:"Fraunces";font-size:1.22rem;font-weight:600;margin:0;letter-spacing:-.01em;
    font-variation-settings:"opsz" 40}
  .card p{font-size:.9rem;color:var(--muted);margin:0;line-height:1.5;flex:1}
  .go{display:inline-flex;align-items:center;gap:6px;font-family:"Inter";font-size:.85rem;
    font-weight:600;color:var(--accent);transition:color .5s ease}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:"Inter";font-size:.85rem;
    font-weight:600;padding:9px 14px;border-radius:11px;text-decoration:none;cursor:pointer;
    border:1.5px solid transparent;
    transition:background-color .2s ease,border-color .2s ease,color .5s ease,filter .2s ease}
  .btn svg{width:15px;height:15px;flex:none}
  .btn-primary{background:var(--panel-bg);color:#fff;transition:background-color .5s ease,filter .2s ease}
  .btn-primary svg{transition:transform .2s ease}
  .btn-primary:hover{filter:brightness(1.14)}
  .btn-primary:hover svg{transform:translateX(3px)}
  .btn-ghost{background:transparent;color:var(--accent);border-color:var(--accent)}
  .btn-ghost:hover{background:var(--accent-soft)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  footer{margin-top:46px;padding-top:20px;border-top:1px solid var(--line);
    font-size:.8rem;color:var(--muted);line-height:1.5;transition:border-color .5s ease}

  @media(max-width:760px){.grid{grid-template-columns:1fr}.brand-btn{min-width:0}}
  @media(max-width:520px){.wrap{padding:32px 18px 48px}.panel{padding:28px 22px}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body data-theme="edgard">
  <div class="wrap">

    <!-- Masthead groupe -->
    <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
    <p class="eyebrow">Groupe</p>
    <h1>Edgard Opticiens <span style="color:var(--muted)">—</span> Générale Optique</h1>
    <p class="role">Portail Ressources Humaines</p>

    <!-- Sélecteur de marque -->
    <div class="switch" role="group" aria-label="Choisissez votre enseigne">
      <button class="brand-btn" data-id="edgard" aria-pressed="true">
        <span class="tick"></span>
        <span class="lbl">Edgard Opticiens</span>
      </button>
      <button class="brand-btn" data-id="gdo" aria-pressed="false">
        <span class="tick"></span>
        <span class="lbl">Générale d'Optique</span>
      </button>
    </div>

    <!-- Panneau marque -->
    <div class="panel">
      <p class="kicker">Espace Ressources Humaines</p>
      <div class="logo-slot">
        <img id="brandLogo" alt="">
        <div id="brandWordmark" class="wordmark" hidden></div>
      </div>
      <p class="intro" id="brandIntro"></p>
    </div>

    <!-- Cartes outils -->
    <div class="grid" id="grid"></div>

    <footer id="footer"></footer>
  </div>

<script>
/* =====================================================================
   CONFIGURATION — tout se règle ici.
   • LOGOS : dépose tes fichiers (ex. logo-edgard.svg, logo-gdo.svg) dans
     le même dossier que cette page. Si le fichier est absent, le nom de
     l'enseigne s'affiche en texte automatiquement.
   • LIENS : adresses GitHub Pages de chaque outil.
   ===================================================================== */

const MARQUES = {
  edgard:{
    nom:"Edgard Opticiens",
    logo:"logo-edgard.svg",
    wordmark:"Edgard", baseline:"Opticiens",
    intro:"Bienvenue dans l'espace RH d'Edgard Opticiens. Posez vos congés, déclarez vos heures supplémentaires et saisissez vos variables de paie.",
  },
  gdo:{
    nom:"Générale d'Optique",
    logo:"logo-gdo.svg",
    wordmark:"Générale d'Optique", baseline:"",
    intro:"Bienvenue dans l'espace RH de Générale d'Optique. Posez vos congés, déclarez vos heures supplémentaires et saisissez vos variables de paie.",
  },
};

const OUTILS = [
  {
    titre:"Je pose des congés",
    desc:"Demande de congés payés et d'absences, transmise à votre responsable pour signature.",
    icone:"calendar",
    liens:{
      edgard:"https://edgard-opticiens.github.io/conges-payes/",
      gdo:"https://edgard-opticiens.github.io/conges-payes-gdo/",
    },
    procedures:{
      edgard:"procedures/procedure-conges-edgard.pdf",
      gdo:"procedures/procedure-conges-gdo.pdf",
    }
  },
  {
    titre:"Demander des heures supplémentaires",
    desc:"Saisie et envoi d'une demande d'heures supplémentaires.",
    icone:"clock",
    lien:"https://edgard-opticiens.github.io/heuressupp/",
    procedure:"procedures/procedure-heures-supp.pdf"   // même procédure Edgard et GdO
  },
  {
    titre:"Je fais ma note de frais",
    desc:"Saisie des frais avec calcul des indemnités kilométriques et envoi signé.",
    icone:"receipt",
    lien:"https://edgard-opticiens.github.io/ndf/",
    procedure:"procedures/procedure-note-de-frais.pdf"   // même procédure Edgard et GdO
  },
  {
    titre:"Saisir ma variable de paie",
    desc:"Saisie mensuelle des variables de paie (directeurs de magasin).",
    icone:"euro",
    lien:"https://edgard-opticiens.github.io/variables/"
  },
];
/* ===================================================================== */

const ICONS = {
  calendar:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  euro:'<path d="M17 7a6 6 0 1 0 0 10M4 10h9M4 14h9"/>',
  receipt:'<path d="M6 2h12v20l-2-1.3-2 1.3-2-1.3-2 1.3-2-1.3L6 22z"/><path d="M9.5 8h5M9.5 12h5"/>',
};
const ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
const DOC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 13h5M10 17h5"/></svg>';

let actif = "edgard";

function lienDe(o){ return o.lien !== undefined ? o.lien : (o.liens && o.liens[actif]) || "#"; }
function procedureDe(o){
  if(o.procedure) return o.procedure;
  if(o.procedures) return o.procedures[actif] || null;
  return null;
}

function majPanneau(){
  const m = MARQUES[actif];
  const img = document.getElementById("brandLogo");
  const wm  = document.getElementById("brandWordmark");
  // logo avec repli texte
  wm.hidden = true; img.hidden = false;
  img.onerror = ()=>{ img.hidden=true; wm.hidden=false;
    wm.innerHTML = m.wordmark + (m.baseline?`<small>${m.baseline}</small>`:""); };
  img.src = m.logo;
  document.getElementById("brandIntro").textContent = m.intro;
}

function rendreCartes(){
  const grid=document.getElementById("grid"); grid.innerHTML="";
  OUTILS.forEach(o=>{
    const url=lienDe(o), todo=!url||url==="#";
    const proc=procedureDe(o);
    const card=document.createElement("div");
    card.className="card";
    let actions =
      `<a class="btn btn-primary" href="${url}" ${todo?'':'target="_blank"'} rel="noopener">`+
      `${todo?"Lien à configurer":"Ouvrir l'outil"} ${ARROW}</a>`;
    if(proc) actions +=
      `<a class="btn btn-ghost" href="${proc}" target="_blank" rel="noopener">${DOC} Voir la procédure</a>`;
    card.innerHTML=`
      <span class="ico"><svg viewBox="0 0 24 24" aria-hidden="true">${ICONS[o.icone]||""}</svg></span>
      <h2>${o.titre}</h2>
      <p>${o.desc}</p>
      <div class="actions">${actions}</div>`;
    if(todo) card.querySelector(".btn-primary").addEventListener("click",e=>e.preventDefault());
    grid.appendChild(card);
  });
}

function choisir(id){
  actif=id;
  document.body.dataset.theme=id;
  document.querySelectorAll(".brand-btn").forEach(b=>
    b.setAttribute("aria-pressed", b.dataset.id===id ? "true":"false"));
  majPanneau(); rendreCartes();
}

document.querySelectorAll(".brand-btn").forEach(b=>
  b.addEventListener("click",()=>choisir(b.dataset.id)));

document.getElementById("footer").innerHTML =
  "Portail interne — Groupe Edgard Opticiens / Générale Optique. "+
  "Vos données restent dans chaque outil&nbsp;; cette page ne fait que vous y diriger.";

choisir("edgard");
</script>
</body>
</html>
